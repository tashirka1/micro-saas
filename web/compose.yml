volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local

services:
  web:
    restart: always
    build:
      dockerfile: ./Dockerfile
    env_file: .env

  caddy:
    restart: always
    image: caddy:2.11
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
